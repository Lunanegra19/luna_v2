metalabeler:
  gradient_clip: 1.0
  hmm_allowed_regimes:
  - 1_BULL_TREND
  - 1_BULL_TREND_B
  - 1_BULL_TREND_WEAK
  # Excluidos por alta volatilidad e ineficiencia matemática (sobreoperación / trampas de liquidez):
  # - 1_VOLATILE_BULL
  # - 1_VOLATILE_BULL_B
  - 1_BULL_GRIND
  - 2_CALM_RANGE
  - 2_CALM_RANGE_B
  - 2_VOLATILE_RANGE
  - 2_VOLATILE_RANGE_B
  include_hmm_context: true
  lstm_hidden: 32
  lstm_lr: 0.0003
  max_epochs: 100
  meta_filter_threshold: 0.45  # [FIX-SWEEP-01] Restaurado de 0.55: el calibrador isotónico comprime probs a [0,0.548], 0.55 garantizaba 0 señales
  meta_filter_threshold_bull: null
  meta_min_trades: 20
  meta_sweep_max: 0.65    # [FIX-SWEEP-01] Restaurado de 0.78→0.65: el sweep debe cubrir el rango real del calibrador
  meta_sweep_min: 0.40   # [FIX-SWEEP-01] Restaurado de 0.60→0.40: probs isotónicas max≈0.548, sweep [0.60,0.78] daba 0 señales garantizadas
  meta_sweep_step: 0.005 # paso fino para localizar el óptimo con precisión
  meta_v2_dynamic_edge_pct: 0.05
  meta_v2_min_prob: 0.38  # [FIX-SWEEP-01] Restaurado de 0.705→0.38: el FIX-META-THRESHOLD-01 aplica cap dinámico sobre p90(cal_probs)*0.90
  # Umbral de alta confianza selectivo para posiciones BULL LONG (Escenario 6)
  meta_v2_min_prob_bull_long: 0.55
  meta_v2_threshold_mode: dynamic_is
  momentum_filter_threshold: -15.0
  momentum_filter_threshold_upper: -30.0
  # [MEJORA-MOMENTUM-01] Filtro de velocidad de caída — diferencia correcciones ordenadas de crashes.
  # Si ret_30d < momentum_filter_threshold pero la caída es LENTA (speed > crash_speed_threshold),
  # se considera corrección ordenada y se relaja el umbral al valor 'ordered_correction_threshold'.
  # speed = variación del ret_30d en los últimos momentum_speed_window velas (horas).
  # Ejemplo: BTC -25% en 60 días (speed~-0.4%/día) es corrección. -25% en 5 días (speed~-5%/día) es crash.
  momentum_speed_window: 120        # ventana en horas para calcular la velocidad (5 días × 24H)
  momentum_crash_speed_threshold: -5.0   # si speed_30d < -5% en 5 días → crash → bloquear
  momentum_ordered_correction_threshold: -25.0  # umbral relajado para correcciones ordenadas (no crash)
  n_cpcv_groups: 8
  patience: 15
  rf_max_depth: 6
  rf_max_samples: 0.6
  rf_min_samples_leaf: 10
  rf_n_estimators: 200
  seq_len: 48
  simulate_online_recalibration: true
  skip_metalabeler: false
  weight_decay_alpha: 0.5
ood_guard:
  block_on_low_unique: true
  contamination: 0.005
  max_constant_pct: 0.95
  min_std_ratio: 0.05
  min_unique_in_train: 5
  min_unique_values: 3
  n_estimators: 200
