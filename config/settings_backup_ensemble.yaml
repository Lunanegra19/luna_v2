position_sizer:
  # [FIX-KELLY-001/003] Capital base institucional (OKX Demo portfolio value).
  # CRITICO: Este valor es el que usa PositionSizer.calculate_position_size().
  # El valor anterior (5000.0 hardcodeado) producía sizing 20x infra-dimensionado.
  # Fuente canónica: live_state.portfolio_value en PostgreSQL VPS.
  base_capital: 100000.0
  # Fracción de riesgo sobre el capital (Half-Kelly estático de seguridad).
  # El 14.17% de la run Mayo-2026 es un resultado empírico, NO una constante fija.
  # Con base_risk_fraction=0.20 y base_capital=100000: exposure=$20,000/trade.
  base_risk_fraction: 0.20
  dd_half_size: 0.1
  dd_kill_switch: 0.15
  dd_three_quarter: 0.05
  ewma_lambda: 0.94
  kelly_fraction: 0.25
  max_dd_stop_pct: 50.0
  max_orderbook_pct: 0.05
  target_vol_annual: 0.25
  spot_dust_threshold: 20.0
project:
  description: Unified AI trading system merging Correlaciones + Luna v2
  name: Luna V1
  version: 1.0.0
sop:
  annual_factor: 93.6
  cost_pct: 0.0015
  cpcv_groups: 10
  embargo_hours: 72
  purge_hours: 96
stat:
  # [GAUNTLET-FIX-01 2026-05-28] Umbrales corregidos tras análisis estadístico profundo.
  # Ver docs/parametros_fijos.md §GAUNTLET-FIX-01 para justificación completa.
  #
  # alpha_binomial: 1.0→0.20
  #   Historia: alpha=1.0 (gate deshabilitado) fue necesario con n=30-55 trades donde
  #   alpha=0.05 exige WR>65% (inalcanzable). Con n≥64 y WR~56%, alpha=0.20 activa el gate
  #   de forma operativamente viable. El DSR sigue siendo el discriminante primario.
  #   alpha=0.20 correcto para shadow trading pre-producción (para producción real: alpha=0.10).
  #   Ref: audit_binomial_impact.py — ninguna seed SFI18 (n=34-55) pasaba alpha=0.05.
  alpha_binomial: 0.20
  #
  # max_drawdown: 0.60→0.25
  #   El kill_switch de circuit breakers está en 15% (settings risk). Aprobar estrategias
  #   con MaxDD=59% es inconsistente con los circuit breakers de producción que pararían
  #   automáticamente a ese nivel. 25% es coherente (kill_switch × 1.67).
  max_drawdown: 0.25
  max_pbo: 0.22
  mc_block_size_hours: 96
  mc_simulations: 10000
  min_dsr: 0.75
  # min_trades: 32→64
  #   SOP R8: 30 trades shadow→paper, 100 para inferencia confiable.
  #   64 garantiza block_size=8 para CSCV (PBO fiable) y IC WR de ±12.3%.
  #   Con n=32, block_size=4 → PBO CSCV poco fiable.
  min_trades: 64
  n_trials_total: 100
  pbo_n_blocks: 8
  total_return_cap: 1000000.0
  wfv_max_std_dsr: 0.3
  wfv_min_window_dsr: 0.1
  wfv_n_windows: 4
  cusum_threshold: 4.5  # [FIX-9] Hawkins&Olwell(1998), rango [4.0, 5.0]
  # [P1-PHASE-GATES 2026-05-21] Gates críticos de Phase Gates — OBLIGATORIOS (política no-fallback).
  # Estos valores eran hardcodeados en phase_gates.py L88-L109. Ahora son la fuente canónica.
  # Referencia: parametros_fijos_base.md BLOQUE 8.
  xgb_auc_hard_stop: 0.510         # G2: AUC OOS mínima para no abortar
  xgb_auc_warn: 0.530              # G2: AUC warning (no crítico)
  xgb_brier_hard_stop: 0.2850     # G2: Brier máximo — ver GATE-G2-BRIER-01 en phase_gates.py
  xgb_brier_warn: 0.2700          # G2: Brier warning
  xgb_brier_degraded_max_agents: 1 # G2: 1 agente puede fallar (DEGRADED), 2+ → HARD STOP
  xgb_proba_std_min: 0.010         # G2: std(proba) mínima — modelo degenerado si menor
  lgbm_proba_std_min: 0.010        # G3: std(proba) LGBM mínima
  hmm_min_active_states: 2         # G3: estados HMM activos mínimos en OOS
  sfi_min_features: 5              # G1: mínimo de features seleccionadas por SFI
  data_min_rows: 1000              # G0: mínimo de filas en features_train.parquet
  data_max_gap_h: 48               # G0: gap máximo en horas entre velas
  signal_min_count_warn: 5         # G5: mínimo de señales (warning, no hard-stop)
  max_latency_seconds: 120         # Límite máximo de latencia permitida para el ciclo (segundos)


temporal_splits:
  embargo_hours: 24
  hmm_train_end: 2025-03-31
  holdout_end: 2025-06-30
  holdout_start: 2025-04-01
  train_end: 2025-01-31
  train_start: '2017-08-17'
  validation_end: 2025-03-31
  validation_start: 2025-02-01
wfb:
  ensemble_consensus_threshold: 2
  consensus_bucket_hours: 2           # [FIX-D4 2026-05-28] Ventana temporal para agrupar señales del mismo evento de mercado.
                                      # Modelos con hiperparámetros distintos (Optuna stochastic) pueden generar señales
                                      # con offset de 1-2H para el mismo evento. El gate exacto (1H) las trata como
                                      # independientes, perdiendo x2-3 trades de consenso válido.
                                      # Con bucket=2H: señales dentro de ±1H del mismo evento se cuentan juntas.
                                      # Valor 1 = comportamiento original (sin agrupación). Documentado en parametros_fijos.md.
  max_seeds_to_explore: 20            # [OPT-ENSEMBLE-01 2026-05-28] Máximo de semillas a explorar en una run WFB.
                                      # Actualizado de 8→20 basado en análisis empírico de tasa de aprobación:
                                      #   - Tasa aprobación histórica: 13.3% (4/30 seeds pasan el Gauntlet)
                                      #   - Para 5 aprobadas: se necesitan explorar ~38 seeds en media
                                      #   - 20 es un valor conservador pero suficiente para runs largas con --resume
                                      # NOTA: max_seeds_to_explore controla seeds ALEATORIAS EXTRA (no las del --seeds CLI).
                                      # La corrección R5 depende de len(--seeds CLI), NO de este parámetro.
  min_seeds_to_approve: 5             # [OPT-ENSEMBLE-01 2026-05-28] Mínimo de semillas aprobadas para detener exploración.
                                      # Actualizado de 3→5 por evidencia estadística:
                                      #   - rho_inter-seed = 0.076 (baja correlación → cada seed aporta señal real)
                                      #   - Teorema ensemble: N=5 da Var_ens=0.261 vs N=3 Var_ens=0.384
                                      #   - Ganancia SR relativo: +21.4% al pasar de 3→5 seeds
                                      #   - Ganancia marginal 5→8: solo +16.7% (rendimientos decrecientes)
                                      # CONSECUENCIA: debe lanzarse el CLI con ≥7 seeds para que el R5
                                      # sea coherente (factor R5=sqrt(log(7))=1.395 con 7 seeds planificadas).

  soft_embargo_enabled: true          # [MEJORA-F3-01 2026-05-22] Activar Consensus-Soft Embargo en el ensamble consolidado
  soft_embargo_hours: 24.0            # [MEJORA-F3-01] Horas de embargo si el consenso es >= 4 semillas concurrentes
  active_seeds:         # [OPT-ENSEMBLE-01] Ampliado a 7 seeds para que CLI tenga N=7 seeds planificadas.
                        # Con N=7: factor R5=sqrt(log(7))=1.395 → coherente con min_seeds_to_approve=5.
                        # Con tasa aprobación ~13%, explorar 7 seeds da ~0.93 aprobadas → necesitas
                        # max_seeds_to_explore=20 para completar el quórum de 5 via generación aleatoria.
    - 42
    - 100
    - 777
    - 1337
    - 2025
    - 48907
    - 99
  circuit_breaker:                    # [P2-A 2026-05-28] Circuit Breaker de Régimen Mensual (Hipótesis #2)
    enabled: true                     # Activar el CB. False = sin filtro de régimen adverso.
    min_seeds_adverse: 4              # [PARAM-FIJO] Mínimo de seeds con WR rolling < threshold para activar CB.
                                      # Calibrado empíricamente: May-Jun 2025 y Ene-2026 tuvieron 5/6 seeds adversas.
                                      # Con threshold=4 se activa en ambos regímenes adversos reales.
                                      # Documentado en docs/parametros_fijos.md §CB-01.
    wr_threshold: 0.38                # [PARAM-FIJO] Win Rate rolling 30d por debajo del cual una seed es "adversa".
                                      # Calibrado: WR<38% captura regímenes de pérdida sistemática sin falsos positivos.
                                      # May-Jun 2025: WR promedio ~38%. Ene-2026: WR promedio ~15%.
                                      # Documentado en docs/parametros_fijos.md §CB-01.
    rolling_days: 30                  # Ventana rolling en días naturales para calcular WR.
                                      # 30 días es la granularidad mensual del análisis de regímenes.
  psi_alert_threshold: 0.25

  psi_cooldown_hours: 336
  psi_ewma_span: 168
  psi_halt_threshold: 0.5
  rolling_window_years: 3
  training_mode: rolling
  val_min_samples_per_regime: 50
  val_samples_per_regime: 300
  validation_mode: regime_stratified
  windows:
  - holdout_end: '2025-03-31'
    holdout_start: '2025-01-01'
    id: W1
    train_end: '2024-10-31'
    val_end: '2024-12-31'
    val_start: '2024-11-01'
  - holdout_end: '2025-06-30'
    holdout_start: '2025-04-01'
    id: W2
    train_end: '2025-01-31'
    val_end: '2025-03-31'
    val_start: '2025-02-01'
  - holdout_end: '2025-09-30'
    holdout_start: '2025-07-01'
    id: W3
    train_end: '2025-04-30'
    val_end: '2025-06-30'
    val_start: '2025-05-01'
  - holdout_end: '2025-12-31'
    holdout_start: '2025-10-01'
    id: W4
    train_end: '2025-07-31'
    val_end: '2025-09-30'
    val_start: '2025-08-01'
  - holdout_end: '2026-03-31'
    holdout_start: '2026-01-01'
    id: W5
    train_end: '2025-10-31'
    val_end: '2025-12-31'
    val_start: '2025-11-01'
xgboost:
  calibration_min_samples_isotonic: 1000
  calibration_fallback_method: "sigmoid"
  embargo_dynamic_decay: true
  embargo_decay_atr_lookback: 24
  embargo_low_density_threshold: 20
  embargo_min_hours: 48.0
  dynamic_barrier: true
  dynamic_horizon_min_h: 24
  embargo_hours: 24
  event_sampling_hours: 12
  focal_loss_gamma: 2.0
  hmm_velocity_ewm_span: 24
  holdout_calib_months: 0
  linear_decay_pt: false  # [LUNA-V2-FIX] Desactivado para restaurar la simetría del ratio R:R (evita recortar ganancias prematuramente)
  n_estimators_min_floor: 100
  n_purged_splits: 8
  # Tabla de referencia temporal CPCV / Robustez Estadistica (ARCH-03):
  # - n=6 grupos: ~28.6H por split. Warning: Baja Robustez (< 15 paths).
  # - n=8 grupos: ~15.2H por split. Warning: BajaRobustez (< 28 paths).
  # - n=10 grupos: ~12.4H por split. OK: Alta Robustez (>= 45 paths).
  optuna_metric: brier
  optuna_search_space:
    colsample_bytree_max: 0.85
    colsample_bytree_min: 0.4
    focal_loss_gamma_max: 4.0
    focal_loss_gamma_min: 0.5
    gamma_max: 5.0
    gamma_min: 0.05
    learning_rate_max: 0.15
    learning_rate_min: 0.005
    max_depth_max: 4
    max_depth_min: 2
    min_child_weight_max: 100
    min_child_weight_min: 30
    n_estimators_max: 2000
    n_estimators_min: 100
    reg_alpha_max: 50.0
    reg_alpha_min: 0.01
    reg_lambda_max: 2.0
    reg_lambda_min: 0.01
    subsample_max: 0.85
    subsample_min: 0.5
  optuna_seed: 100
  optuna_trials: 100
  pt_decay_fraction: 0.75
  pt_mult_max: 2.2
  pt_mult_min: 1.8
  regime_tbm_profiles:
    bear:
      pt_mult_min: 1.0
      sl_mult_min: 1.5
    bull:
      pt_mult_min: 1.3
      sl_mult_min: 1.5
    range:
      pt_mult_min: 1.0
      sl_mult_min: 1.0
  signal_prob_max: 1.0
  sl_mult_max: 1.5
  sl_mult_min: 1.5
  target_recall: 0.7
  tbm_min_return: 0.003
  threshold_min_density_pct: 0.15
  threshold_min_trades: 20
  threshold_sweep_max: 0.72
  threshold_sweep_min: 0.45
  threshold_sweep_step: 0.005
  use_focal_loss: false  # [FIX-XGB-A] Desactivado: Focal Loss + restauracion post-fit binary:logistic genera Brier>0.25 (peor que random). binary:logistic nativo produce probs calibradas.
  use_regime_agents: true
  vertical_barrier_hours: 72
  weight_decay_alpha: 0.5
  xgb_min_signals_count: 0
  xgb_min_signals_threshold: 0.45
  xgb_signal_threshold: 0.48

# ─────────────────────────────────────────────────────────────
# DASHBOARD HEALTH-CHECK  (tools/diagnostics/dashboard_healthcheck.py)
# Ejecutado post-ciclo y via PM2 cron cada 30 min en VPS.
# RULE[settingsyfallvack.md]: No-Fallback — KeyError si esta seccion falta.
# ─────────────────────────────────────────────────────────────
dashboard_healthcheck:
  enabled: true
  base_url: "http://localhost:5050"      # URL del dashboard Flask en VPS
  max_response_time_sec: 15              # Timeout por endpoint
  max_data_age_hours: 3                  # audit_logs sin datos > 3h = alerta
  telegram_alert_on_failure: true        # Enviar alerta Telegram si falla
  post_cycle_enabled: true               # Ejecutar despues de cada ciclo live
  endpoints:
    - path: "/api/status"
      description: "Dashboard status principal"
      required_fields: ["status"]
      allow_standby: true
    - path: "/api/live-state"
      description: "Estado del sistema live (portfolio, drawdown)"
      required_fields: ["status"]
      allow_standby: true
    - path: "/api/hour-decision"
      description: "Decision horaria actual (XGB, Meta, Consenso)"
      required_fields: ["status"]
      allow_standby: true
