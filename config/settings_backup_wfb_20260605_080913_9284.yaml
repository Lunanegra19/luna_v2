xgboost:
  # [CALIBRATION-FIX 2026-06-04] Requerimiento isotónico incrementado a 50000 para forzar el uso del método 'sigmoid' (Platt Scaling) y evitar la compresión de probabilidades en muestras OOS pequeñas.
  calibration_min_samples_isotonic: 50000
  calibration_fallback_method: sigmoid
  embargo_dynamic_decay: true
  embargo_decay_atr_lookback: 24
  embargo_low_density_threshold: 20
  embargo_hours: 96
  embargo_min_hours: 96.0
  dynamic_barrier: true
  dynamic_horizon_min_h: 24
  event_sampling_hours: 12
  focal_loss_gamma: 2.0
  hmm_velocity_ewm_span: 24
  holdout_calib_months: 0
  linear_decay_pt: false
  n_estimators_min_floor: 100
  min_viable_train_samples: 200
  bull_gate_min_dsr: 0.2
  n_purged_splits: 8
  # Tabla de referencia CPCV — ETA de robustez por n_groups [ARCH-03]:
  # n=6  -> ~200 combinaciones | RobustezBaja  | ETA ~12.4H  | prod minimo
  # n=8  -> ~1820 combinaciones | RobustezMedia | ETA ~24H    | recomendado [ACTUAL]
  # n=10 -> ~45045 combinaciones | RobustezAlta  | ETA ~72H    | solo holdout final
  # BajaRobustez (n<6): no apto para produccion — max-PBO inflado
  optuna_metric: brier
  optuna_search_space:
    colsample_bytree_max: 0.85
    colsample_bytree_min: 0.4
    focal_loss_gamma_max: 4.0
    focal_loss_gamma_min: 0.5
    gamma_max: 2.0
    gamma_min: 0.05
    learning_rate_max: 0.15
    learning_rate_min: 0.01
    max_depth_max: 4
    max_depth_min: 2
    min_child_weight_max: 5
    min_child_weight_min: 3
    n_estimators_max: 2000
    n_estimators_min: 100
    reg_alpha_max: 0.5
    reg_alpha_min: 0.01
    reg_lambda_max: 2.0
    reg_lambda_min: 0.01
    subsample_max: 0.85
    subsample_min: 0.5
  optuna_seed: 42
  optuna_trials: 100
  pt_decay_fraction: 0.75
  pt_mult_max: 2.2
  pt_mult_min: 1.8
  regime_tbm_profiles:
    bear:
      pt_mult_min: 1.0
      sl_mult_min: 1.5
    bull:
      pt_mult_min: 1.3
      sl_mult_min: 1.5
    range:
      pt_mult_min: 1.0
      sl_mult_min: 1.0
  signal_prob_max: 1.0
  sl_mult_max: 1.5
  sl_mult_min: 1.5
  target_recall: 0.7
  tbm_min_return: 0.003
  threshold_min_density_pct: 0.15
  threshold_min_trades: 20
  threshold_sweep_max: 0.72
  threshold_sweep_min: 0.45
  threshold_sweep_step: 0.005
  use_focal_loss: false
  use_regime_agents: true
  vertical_barrier_hours: 96
  weight_decay_alpha: 0.5
  xgb_min_signals_count: 0
  xgb_min_signals_threshold: 0.45
  xgb_signal_threshold: 0.48
dashboard_healthcheck:
  enabled: true
  base_url: http://localhost:5050
  max_response_time_sec: 15
  max_data_age_hours: 3
  telegram_alert_on_failure: true
  post_cycle_enabled: true
  endpoints:
  - path: /api/status
    description: Dashboard status principal
    required_fields:
    - status
    allow_standby: true
  - path: /api/live-state
    description: Estado del sistema live (portfolio, drawdown)
    required_fields:
    - status
    allow_standby: true
  - path: /api/hour-decision
    description: Decision horaria actual (XGB, Meta, Consenso)
    required_fields:
    - status
    allow_standby: true

# ─── SHAP Feature Auditor ─────────────────────────────────────────────────────
# Mide empiricamente si las features forzadas por cuota/boost del SFI
# aportan valor real o son slots desperdiciados.
# [SHAP-AUDIT-01 2026-06-03]
shap_audit:
  enabled: true
  min_importance_threshold: 0.02   # FI normalizada minima para considerarse "activa"
                                    # < 2% en una ventana = no esta contribuyendo
  consecutive_windows_alert: 3     # N ventanas consecutivas bajo umbral → WARNING
  consecutive_windows_remove: 5    # N ventanas consecutivas bajo umbral → CRITICAL
                                    # (candidato a eliminar de la whitelist)
  importance_types:                 # tipos de FI a trackear (gain es el mas informativo)
  - gain

