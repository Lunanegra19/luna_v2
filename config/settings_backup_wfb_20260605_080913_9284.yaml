  # [H5-ROLL-SR-GATE 2026-06-03] Kelly gate por Sharpe Rolling intra-ventana OOS
  # MECANISMO VALIDO: rho(roll_SR, ret_t+1)=0.42 p<0.001 (validado, no overfitting)
  # DESHABILITADO 2026-06-03: implementacion per-seed con deque que se reinicia por ventana
  #   genera falsos positivos severos en ventanas buenas:
  #   - W3: 54 trades gateados con WR=88.9% (trades BUENOS del ensemble eliminados)
  #   - Causa: con solo 10-18 trades/ventana, la deque empieza vacia y cualquier racha
  #     de 2 perdidas early en W3 dispara el gate sobre la recuperacion posterior.
  #   - Requiere: >= 150 portfolio trades en historia estable (multi-window) para activar.
  # RE-ACTIVAR cuando: ensemble tenga >= 5 ventanas OOS con >= 30 trades/ventana c/u.
  roll_sr_gate_enabled: false      # DESHABILITADO (ver comentario arriba)
  roll_sr_window: 10               # Ventana de trades para calcular rolling Sharpe
  roll_sr_threshold: 0.0           # Kelly=0 si roll_SR < este umbral (0.0 = optimo validado)
