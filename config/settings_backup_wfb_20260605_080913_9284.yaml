  sfi_top_n: 13
  # Leyenda de clasificacion de features por tipo de origen [ARCH-03]:
  # TIPO-1: Features endogenas (precios, returns, vols) — siempre disponibles, alta frecuencia
  # TIPO-2: Features macro/onchain (M2, DXY, Exchange Flows, LTH) — lag 24H-240H, menor frecuencia
  # TIPO-3: Features derivadas/combinadas (HMM regime, alpha_rules, DXY-HMM conditional) — lag minimo 1H
  stability_min_dsr: 0.0
  stability_min_positive: 3
  stability_penalty_weight: 0.5
  stability_selection_weight: 0.6
  stability_half_life_years: 2.0
  stability_recent_window_years: 2
  stability_trend_window_years: 4
  stability_trend_threshold: 0.1
  stability_variance_threshold: 1.0e-06
  stability_min_real_years: 2
  stability_maturity_min_years: 3
  stability_dead_threshold_years: 2
  stability_gap_penalty: -0.5
  # [SFI-BALANCE-01 2026-06-03] Boost aditivo para features OOS-estables en ranking de cluster.
  # Aplica a TODAS las categorías (macro + onchain + calendar) por igual.
  sfi_macro_stable_boost: 0.25

  # ── CATEGORÍA 1: Macro Estructural ──────────────────────────────────────────
  # Features de ciclo trimestral/anual — OOS-estables porque reflejan condiciones
  # macroeconómicas que NO cambian de semana en semana.
  # Quota: mínimo 3 slots de los 13 Top-N garantizados para esta categoría.
  # [SFI-BALANCE-01 2026-06-03]
  sfi_macro_features:
  - M2_MoM_Chg
  - M2_YoY_Chg
  - Global_M2_Index
  - M2_Global_YoY
  - Fed_Net_Liquidity
  - Fed_Net_Liq_90d_Std
  - G3_Net_Liquidity_ZScore_90d
  - YieldCurve_10Y3M
  - T10Y2Y
  - yield_curve_pct_1y
  - RealYield_10Y
  - FedFundsRate
  - CreditSpread_HY_IG          # [CREDIT-SPREAD-01 2026-06-03]
  - CreditSpread_HY_IG_z90d
  - CreditSpread_HY_z90d
  - CPI_YoY
  - fear_greed_normalized
  - MOVE
  - DVOL
  - DXY_HMM_cond         # [DXY-HMM-01 2026-06-03] DXY_Ret x regime_sign — sin ambigüedad
  - DXY_HMM_bull_neg     # [DXY-HMM-01 2026-06-03] DXY_Ret x bull_flag x(-1) — señal pura en bull
  - DXY_HMM_interact     # [DXY-HMM-01 2026-06-03] DXY_Zscore x regime_norm — interacción suave
  sfi_macro_min_slots: 3

  # ── CATEGORÍA 2: Onchain Valuation ──────────────────────────────────────────
  # Features de valoración onchain — causal (precio del suministro BTC, no momentum).
  # MVRV y SSR son los mejores indicadores de ciclo de acumulación/distribución.
  # Quota: mínimo 1 slot garantizado — evita runs sin ningún contexto onchain.
  # [SFI-BALANCE-01 2026-06-03]
  sfi_onchain_features:
  - MVRV_Proxy
  - SSR_ZScore
  - SSR
  - Stablecoins_Delta_30d
  - Stablecoin_Cap_Delta
  - Puell_Multiple
  - puell_multiple_proxy
  - oc_puell_multiple_proxy
  - Hash_Rate
  - FundingRate
  - dv_funding_rate
  - Exchange_NetFlow           # [EXCHANGE-FLOW-01 2026-06-03] flujo diario BTC real
  - Exchange_NetFlow_7dEMA     # [EXCHANGE-FLOW-01 2026-06-03] suavizado EMA 7d
  - Exchange_NetFlow_z30d      # [EXCHANGE-FLOW-01 2026-06-03] z-score 30d (OOS-estable)
  - Exchange_NetFlow_Accum30d  # [EXCHANGE-FLOW-01 2026-06-03] tendencia acumulada 30d
  - Exchange_Outflow_Signal    # [EXCHANGE-FLOW-01 2026-06-03] binario: acumulacion activa
  - NonEx_Supply               # [LTH-SUPPLY-01 2026-06-03] BTC en wallets no-exchange
  - Exchange_Supply_Pct        # [LTH-SUPPLY-01 2026-06-03] % BTC en exchanges (cae=acumulacion)
  - LTH_Supply_Change_30d      # [LTH-SUPPLY-01 2026-06-03] cambio 30d en supply HODLers
  - LTH_Accum_Signal           # [LTH-SUPPLY-01 2026-06-03] binario: acumulacion sostenida
  - NonEx_Supply_z90d          # [LTH-SUPPLY-01 2026-06-03] z-score 90d (cross-ciclo)
  sfi_onchain_min_slots: 1


  # ── CATEGORÍA 3: Calendar / Halving ─────────────────────────────────────────
  # Features determinísticas del ciclo de suministro de BTC.
  # Máxima estabilidad OOS posible: el halving no depende del mercado.
  # La codificación sin/cos elimina la discontinuidad del ciclo lineal.
  # Quota: mínimo 1 slot garantizado — el halving SIEMPRE debe estar en XGBoost.
  # [HALVING-HARMONIC-01 2026-06-03] [SFI-BALANCE-01 2026-06-03]
  sfi_calendar_features:
  - cal_halving_cycle_sin
  - cal_halving_cycle_cos
  - cal_days_to_next_halving
  - cal_days_since_halving
  - cal_halving_cycle_pct
  sfi_calendar_min_slots: 1

  # ── Lista unificada para el mecanismo de boost (backward compatible) ─────────
  # Esta lista es la UNIÓN de las tres categorías anteriores.
  # La usa el boost de cluster-ranking en la Etapa B del SFI.
  # NOTA: Mantener sincronizada con las tres listas de arriba.
  sfi_macro_stable_features:
  - M2_MoM_Chg
  - M2_YoY_Chg
  - Global_M2_Index
  - M2_Global_YoY
  - Fed_Net_Liquidity
  - Fed_Net_Liq_90d_Std
  - G3_Net_Liquidity_ZScore_90d
  - YieldCurve_10Y3M
  - T10Y2Y
  - yield_curve_pct_1y
  - RealYield_10Y
  - FedFundsRate
  - CreditSpread_HY_IG
  - CreditSpread_HY_IG_z90d
  - CreditSpread_HY_z90d
  - CPI_YoY
  - fear_greed_normalized
  - MOVE
  - DVOL
  - MVRV_Proxy
  - SSR_ZScore
  - SSR
  - Stablecoins_Delta_30d
  - Stablecoin_Cap_Delta
  - Puell_Multiple
  - puell_multiple_proxy
  - oc_puell_multiple_proxy
  - Hash_Rate
  - FundingRate
  - dv_funding_rate
  - cal_halving_cycle_sin
  - cal_halving_cycle_cos
  - cal_days_to_next_halving
  - cal_days_since_halving
  - cal_halving_cycle_pct
  - DXY_HMM_cond         # [DXY-HMM-01 2026-06-03]
  - DXY_HMM_bull_neg     # [DXY-HMM-01 2026-06-03]
  - DXY_HMM_interact     # [DXY-HMM-01 2026-06-03]
  - Exchange_NetFlow_z30d      # [EXCHANGE-FLOW-01 2026-06-03]
  - Exchange_NetFlow_Accum30d  # [EXCHANGE-FLOW-01 2026-06-03]
  - Exchange_Outflow_Signal    # [EXCHANGE-FLOW-01 2026-06-03]
  - LTH_Supply_Change_30d      # [LTH-SUPPLY-01 2026-06-03]
  - LTH_Accum_Signal           # [LTH-SUPPLY-01 2026-06-03]
  - NonEx_Supply_z90d          # [LTH-SUPPLY-01 2026-06-03]
  - Exchange_Supply_Pct        # [LTH-SUPPLY-01 2026-06-03]
  timing_features_bypass_sfi: false




